
<style>
#erd { width: 100%; overflow-x: auto; }
#erd svg { min-width: 900px; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  USERS {
    uuid id PK
    string name
    string email
    string avatar_url
    string github_token
    string google_id
    string github_id
    enum role
    timestamp created_at
  }
  PROJECTS {
    uuid id PK
    uuid owner_id FK
    string name
    string description
    date deadline
    int progress
    timestamp created_at
  }
  PROJECT_MEMBERS {
    uuid id PK
    uuid project_id FK
    uuid user_id FK
    enum role
  }
  SPRINTS {
    uuid id PK
    uuid project_id FK
    string name
    date start_date
    date end_date
    enum status
  }
  TASKS {
    uuid id PK
    uuid project_id FK
    uuid sprint_id FK
    uuid assignee_id FK
    uuid reporter_id FK
    string title
    text description
    enum status
    enum priority
    int order_index
    date due_date
    timestamp created_at
  }
  TASK_COMMENTS {
    uuid id PK
    uuid task_id FK
    uuid user_id FK
    text content
    timestamp created_at
  }
  REPOSITORIES {
    uuid id PK
    uuid project_id FK
    string github_repo_id
    string name
    string full_name
    string webhook_secret
  }
  COMMITS {
    uuid id PK
    uuid repo_id FK
    uuid task_id FK
    string sha
    string message
    string author_name
    string files_changed
    timestamp committed_at
  }
  PULL_REQUESTS {
    uuid id PK
    uuid repo_id FK
    int github_pr_number
    string title
    enum state
    timestamp merged_at
  }
  MESSAGES {
    uuid id PK
    uuid project_id FK
    uuid sender_id FK
    uuid receiver_id FK
    text content
    boolean is_group
    timestamp created_at
  }
  PREDICTION_RESULTS {
    uuid id PK
    uuid repo_id FK
    string file_path
    float commit_frequency
    float code_churn
    int num_contributors
    int pr_count
    float bug_fix_ratio
    enum risk_level
    float confidence
    timestamp predicted_at
  }
  ACTIVITY_LOGS {
    uuid id PK
    uuid project_id FK
    uuid user_id FK
    string action
    string entity_type
    uuid entity_id
    jsonb metadata
    timestamp created_at
  }
  USERS ||--o{ PROJECTS : owns
  USERS ||--o{ PROJECT_MEMBERS : joins
  PROJECTS ||--o{ PROJECT_MEMBERS : has
  PROJECTS ||--o{ SPRINTS : contains
  PROJECTS ||--o{ TASKS : has
  SPRINTS ||--o{ TASKS : groups
  USERS ||--o{ TASKS : assigned
  TASKS ||--o{ TASK_COMMENTS : has
  USERS ||--o{ TASK_COMMENTS : writes
  PROJECTS ||--o{ REPOSITORIES : links
  REPOSITORIES ||--o{ COMMITS : tracks
  COMMITS }o--o| TASKS : references
  REPOSITORIES ||--o{ PULL_REQUESTS : has
  REPOSITORIES ||--o{ PREDICTION_RESULTS : predicts
  PROJECTS ||--o{ MESSAGES : has
  PROJECTS ||--o{ ACTIVITY_LOGS : logs
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
